blueprint:
  name: HA Smart Ice Cube
  description: >
    ha-smart-ice-cube – Steuert eine Eiswürfelmaschine über Smart Plug und Fingerbot.
    Ein-/Ausschalten via Home Assistant App, HomeKit (input_boolean) oder physischem
    Touch am Fingerbot. Der input_boolean ist Steuerung und Status in einem.
  domain: automation
  source_url: https://github.com/EyJunge1/ha-smart-ice-cube/blob/main/blueprints/automation/ha-smart-ice-cube.yaml
  author: EyJunge1
  homeassistant:
    min_version: "2024.1.0"
  input:
    fingerbot:
      name: Fingerbot
      description: Tuya TS0001 Fingerbot (Zigbee2MQTT)
      selector:
        entity:
          filter:
            - domain: switch
          multiple: false
    steckdose:
      name: Steckdose
      description: Smart Plug (NEO NAS-WR01B)
      selector:
        entity:
          filter:
            - domain: switch
          multiple: false
    status_boolean:
      name: Status-Schalter (HomeKit / HA)
      description: >
        input_boolean für Steuerung und Status. In HA anlegen und in HomeKit exponieren.
        Nicht die Steckdose direkt in HomeKit zeigen.
      selector:
        entity:
          filter:
            - domain: input_boolean
          multiple: false
    anlaufzeit:
      name: Anlaufzeit
      description: Wartezeit nach Strom einschalten, bevor der Fingerbot drückt
      default: 10
      selector:
        number:
          min: 5
          max: 30
          step: 1
          unit_of_measurement: s
    nachlaufzeit:
      name: Nachlaufzeit
      description: Wartezeit nach Aus-Druck, bevor die Steckdose den Strom abschaltet
      default: 10
      selector:
        number:
          min: 5
          max: 30
          step: 1
          unit_of_measurement: s

variables:
  fingerbot: !input fingerbot
  steckdose: !input steckdose
  status_boolean: !input status_boolean
  anlaufzeit: !input anlaufzeit
  nachlaufzeit: !input nachlaufzeit

trigger:
  - platform: state
    entity_id: !input status_boolean
    from: "off"
    to: "on"
    id: ein
  - platform: state
    entity_id: !input status_boolean
    from: "on"
    to: "off"
    id: aus
  - platform: state
    entity_id: !input fingerbot
    from: "off"
    to: "on"
    id: touch

condition: []

action:
  - choose:
      # --- Trigger A: HomeKit / App einschalten ---
      - conditions:
          - condition: trigger
            id: ein
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input steckdose
          - delay:
              seconds: "{{ anlaufzeit | int }}"
          - service: switch.turn_off
            target:
              entity_id: !input fingerbot
          - service: switch.turn_on
            target:
              entity_id: !input fingerbot
            data:
              on_time: 1

      # --- Trigger B: HomeKit / App ausschalten ---
      - conditions:
          - condition: trigger
            id: aus
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input fingerbot
          - service: switch.turn_on
            target:
              entity_id: !input fingerbot
            data:
              on_time: 1
          - delay:
              seconds: "{{ nachlaufzeit | int }}"
          - service: switch.turn_off
            target:
              entity_id: !input steckdose

      # --- Trigger C: physischer Touch am Fingerbot ---
      - conditions:
          - condition: trigger
            id: touch
        sequence:
          - choose:
              # Boolean war an → User hat ausgeschaltet (Fingerbot hat schon gedrückt)
              - conditions:
                  - condition: state
                    entity_id: !input status_boolean
                    state: "on"
                sequence:
                  - delay:
                      seconds: "{{ nachlaufzeit | int }}"
                  - service: switch.turn_off
                    target:
                      entity_id: !input steckdose
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input status_boolean

              # Boolean aus + Steckdose aus → Touch ins Leere, einschalten
              - conditions:
                  - condition: state
                    entity_id: !input steckdose
                    state: "off"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input steckdose
                  - delay:
                      seconds: "{{ anlaufzeit | int }}"
                  - service: switch.turn_off
                    target:
                      entity_id: !input fingerbot
                  - service: switch.turn_on
                    target:
                      entity_id: !input fingerbot
                    data:
                      on_time: 1
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input status_boolean

              # Boolean aus + Steckdose an → Touch hat Maschine eingeschaltet, Status sync
              default:
                - service: input_boolean.turn_on
                  target:
                    entity_id: !input status_boolean

mode: single
